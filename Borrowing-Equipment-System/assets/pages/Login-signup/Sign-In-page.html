<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsEQ</title>

<link rel="stylesheet" href="/assets/styles/Signin.css">
</head>

<body>

<header>
    <img src="../assets/images/main-pic/logo.png" alt="">
    <h1>Borrow Equipment Fast and Easy</h1>
</header>

<nav>
    <a href="#">SIGN UP NOW</a>
</nav>

<main>
    <div class="contain">

        
        <form class="form" action="/assets/pages/Login-signup/verification.html" method="GET">

            <h2>Sign Up</h2>

            <input type="email" placeholder="WMSU Email" required>

            <select required>
                <option value="" disabled selected>Select Occupation</option>
                <option>Student</option>
            </select>

            <select required>
                <option value="" disabled selected>Select College Department</option>
                <option>College of Computing Studies</option>
                <option>College of Engineering</option>
                <option>College of Education</option>
                <option>College of Nursing</option>
            </select>

            <select required>
                <option value="" disabled selected>Select Course</option>
                <option>BS Information Technology</option>
                <option>BS Computer Science</option>
                <option>BS Civil Engineering</option>
                <option>BS Nursing</option>
            </select>

            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Adviser Name" required>
            <input type="text" placeholder="Student ID" required>

            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>

            
            <button type="submit">Sign Up</button>

            <p class="switch">
                Already have an account?
                <a href="Log-In-page.html">Login</a>
            </p>

        </form>

    </div>
</main>

</body>
</html>
