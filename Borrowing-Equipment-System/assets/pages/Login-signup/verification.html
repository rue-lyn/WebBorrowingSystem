<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<link rel="stylesheet" href="/assets/styles/verification.css">
</head>

<body>

<!-- HEADER -->
<header>
    <img src="/assets/images/Screenshot 2026-03-05 142802.png" alt="">
    <h1>Borrow Equipment Fast and Easy</h1>
</header>

<!-- NAV -->
<nav>
    <a href="#">VERIFYING</a>
</nav>

<!-- MAIN OTP SECTION -->
<div class="otp-container">

    <div class="otp-box">

        <h2>Verification Code</h2>
        <p>Enter the 6-digit code sent to your email</p>

        <!-- OTP FORM -->
        <form action="success.html" method="GET">

            <div class="otp-boxes">
                <input type="text" maxlength="1" inputmode="numeric" required>
                <input type="text" maxlength="1" inputmode="numeric" required>
                <input type="text" maxlength="1" inputmode="numeric" required>
                <input type="text" maxlength="1" inputmode="numeric" required>
                <input type="text" maxlength="1" inputmode="numeric" required>
                <input type="text" maxlength="1" inputmode="numeric" required>
            </div>

            <button type="submit">Verify</button>

        </form>

        <!-- RESEND LINK -->
        <p class="resend">
            Didn’t receive code? <a href="#">Resend OTP</a>
        </p>

    </div>

</div>

</body>
</html>
